<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Componentes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>BOTONES</h1>

    <!-- Variantes SOLID -->
<button class="btn btn-luffy">Luffy</button>
<button class="btn btn-sanji">Sanji</button>
<button class="btn btn-nami">Nami</button>
<button class="btn btn-marine">Marine</button>
<button class="btn btn-zoro">Zoro</button>
<button class="btn btn-ghost">Ghost</button>

<!-- Variantes OUTLINE -->
<button class="btn btn-outline-luffy">Se Busca</button>
<button class="btn btn-outline-sanji">Recompensa</button>

<!-- Tamaños -->
<button class="btn btn-luffy btn-sm">Chopper (SM)</button>
<button class="btn btn-luffy">Nakama (MD)</button>
<button class="btn btn-luffy btn-lg">Jinbei (LG)</button>
<button class="btn btn-luffy btn-xl">Kaido (XL)</button>

<!-- Estados -->
<button class="btn btn-luffy" disabled>Deshabilitado</button>

<!-- Modificadores -->
<button class="btn btn-zoro btn-pill">Píldora</button>
<button class="btn btn-marine btn-block">Ancho completo</button>
<button class="btn btn-sanji btn-circle">⚓</button>

<!-- Botón legendario -->
<button class="btn btn-gear-fifth btn-lg">¡GEAR FIFTH!</button>

<!-- Grupo de botones -->
<div class="btn-group">
  <button class="btn btn-marine">Este</button>
  <button class="btn btn-marine">Oeste</button>
  <button class="btn btn-marine">Grand Line</button>
</div>
    
</body>
</html>
