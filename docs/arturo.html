<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Componentes</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>BOTONES</h1>

    <!-- BOTONES CON RELLENO (SOLID) -->

    <button class="btn btn-p">Botón Primario</button>
    <button class="btn btn-s">Botón Secundario</button>
    <button class="btn btn-e">Botón Éxito</button>
    <button class="btn btn-d">Botón Peligro</button>
    <button class="btn btn-w">Botón Advertencia</button>
    <button class="btn btn-i">Botón Información</button>

    <!-- BOTONES CON BORDE (OUTLINE) -->

    <button class="btn btn-o-p">Outline Primario</button>
    <button class="btn btn-o-s">Outline Secundario</button>
    <button class="btn btn-o-e">Outline Éxito</button>
    <button class="btn btn-o-d">Outline Peligro</button>
    <button class="btn btn-o-w">Outline Advertencia</button>
    <button class="btn btn-o-i">Outline Información</button>

    <!-- TAMAÑOS -->

    <button class="btn btn-p btn-sm">Botón Pequeño</button>
    <button class="btn btn-p btn-md">Botón Mediano</button>
    <button class="btn btn-p btn-lg">Botón Grande</button>

    <!-- ESTADO DESHABILITADO -->

    <button class="btn btn-p" disabled>Botón Desactivado</button>
    <button class="btn btn-d" disabled>Peligro Desactivado</button>

    <!-- COMBINACIONES (variante + tamaño) -->

    <button class="btn btn-e btn-lg">Éxito Grande</button>
    <button class="btn btn-o-d btn-sm">Peligro Outline Pequeño</button>

</body>

</html>
